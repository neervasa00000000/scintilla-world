<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PDF Page Reorder | Scintilla Tools</title>
  <meta name="description" content="Drag and drop to rearrange PDF pages, then download the new PDF. All processing runs in your browser." />
  <link rel="icon" type="image/png" href="../../../assets/logo/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="../convoter/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --accent: #f1f5f9;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    header p {
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 32rem;
      margin: 0 auto;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
    }

    .dropzone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: var(--accent);
    }

    .dropzone:hover, .dropzone.dragover {
      border-color: var(--primary);
      background: #eff6ff;
    }

    .dropzone strong { display: block; margin-bottom: 0.35rem; }
    .dropzone span { font-size: 0.875rem; color: var(--muted); }

    #fileInput { position: absolute; width: 0; height: 0; opacity: 0; }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .toolbar .meta {
      font-size: 0.875rem;
      color: var(--muted);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.6rem 1.1rem;
      font-size: 0.875rem;
      font-weight: 600;
      font-family: inherit;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--primary-hover);
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover:not(:disabled) {
      background: var(--accent);
      color: var(--text);
    }

    .pages-scroll {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      padding: 0.75rem 0.25rem 1rem;
      min-height: 220px;
      align-items: flex-start;
      scroll-behavior: smooth;
    }

    .pages-scroll::-webkit-scrollbar { height: 8px; }
    .pages-scroll::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    .page-card {
      flex: 0 0 auto;
      width: 140px;
      border-radius: 10px;
      border: 2px solid var(--border);
      background: var(--surface);
      overflow: hidden;
      cursor: grab;
      transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s;
      user-select: none;
    }

    .page-card:active { cursor: grabbing; }

    .page-card:hover {
      border-color: #93c5fd;
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.12);
    }

    .page-card.sortable-ghost {
      opacity: 0.35;
      border-style: dashed;
    }

    .page-card.sortable-drag {
      opacity: 0.95;
      box-shadow: 0 12px 40px rgba(15, 23, 42, 0.2);
      transform: scale(1.02);
    }

    .page-thumb {
      width: 100%;
      aspect-ratio: 1 / 1.294;
      object-fit: contain;
      background: #1e293b;
      display: block;
    }

    .page-thumb.loading {
      min-height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      font-size: 0.75rem;
    }

    .page-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0.65rem;
      font-size: 0.75rem;
      font-weight: 600;
      background: var(--accent);
      border-top: 1px solid var(--border);
    }

    .page-footer .pos {
      color: var(--primary);
      font-variant-numeric: tabular-nums;
    }

    .page-footer .orig {
      color: var(--muted);
      font-weight: 500;
    }

    .hint {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    .hidden { display: none !important; }

    .status {
      font-size: 0.875rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    .status.error { color: #b91c1c; }

    iframe#livePreview {
      width: 100%;
      height: min(70vh, 640px);
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #525659;
    }

    .preview-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .preview-row label {
      font-size: 0.875rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>PDF page reorder</h1>
      <p>Drag thumbnails left or right to change order. Positions update live. Download keeps your new sequence.</p>
    </header>

    <div class="panel">
      <label class="dropzone" id="dropzone" for="fileInput">
        <strong>Drop a PDF here or click to choose</strong>
        <span>Files stay on your device — nothing is uploaded.</span>
      </label>
      <input type="file" id="fileInput" accept="application/pdf" />
      <p class="hint">Large files may take a moment to generate thumbnails.</p>
      <p class="status hidden" id="status"></p>
    </div>

    <div class="panel hidden" id="editorPanel">
      <div class="toolbar">
        <div class="meta" id="fileMeta"></div>
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
          <button type="button" class="btn btn-ghost" id="btnReset">Reset order</button>
          <button type="button" class="btn btn-primary" id="btnDownload" disabled>Download PDF</button>
        </div>
      </div>
      <div class="pages-scroll" id="pagesStrip"></div>
      <p class="hint">Tip: the blue number is the new position; the grey label is the original page from your file.</p>

      <div style="margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--border);">
        <div class="preview-row">
          <label>
            <input type="checkbox" id="togglePreview" />
            Live PDF preview (first pages)
          </label>
          <button type="button" class="btn btn-ghost btn-sm" id="btnRefreshPreview" style="padding:0.4rem 0.75rem;font-size:0.8rem;">Refresh preview</button>
        </div>
        <iframe id="livePreview" class="hidden" title="Reordered PDF preview"></iframe>
      </div>
    </div>
  </div>

  <script>
    (function () {
      pdfjsLib.GlobalWorkerOptions.workerSrc = '../convoter/pdf.worker.min.js';

      const dropzone = document.getElementById('dropzone');
      const fileInput = document.getElementById('fileInput');
      const statusEl = document.getElementById('status');
      const editorPanel = document.getElementById('editorPanel');
      const pagesStrip = document.getElementById('pagesStrip');
      const fileMeta = document.getElementById('fileMeta');
      const btnReset = document.getElementById('btnReset');
      const btnDownload = document.getElementById('btnDownload');
      const togglePreview = document.getElementById('togglePreview');
      const livePreview = document.getElementById('livePreview');
      const btnRefreshPreview = document.getElementById('btnRefreshPreview');

      let pdfBytes = null;
      let pdfLibDoc = null;
      let pageCount = 0;
      let sortable = null;
      let previewDebounce = null;

      function setStatus(msg, isError) {
        statusEl.textContent = msg || '';
        statusEl.classList.toggle('hidden', !msg);
        statusEl.classList.toggle('error', !!isError);
      }

      function getOrderFromDom() {
        return Array.from(pagesStrip.querySelectorAll('.page-card')).map(function (el) {
          return Number(el.dataset.originalIndex);
        });
      }

      function updatePositionLabels() {
        const cards = pagesStrip.querySelectorAll('.page-card');
        cards.forEach(function (card, i) {
          const pos = card.querySelector('.pos');
          if (pos) pos.textContent = String(i + 1);
        });
      }

      async function renderThumbnails(data) {
        pagesStrip.innerHTML = '';
        const pdf = await pdfjsLib.getDocument({ data: data }).promise;
        pageCount = pdf.numPages;

        for (let i = 1; i <= pageCount; i++) {
          const card = document.createElement('div');
          card.className = 'page-card';
          card.dataset.originalIndex = String(i - 1);

          const thumb = document.createElement('div');
          thumb.className = 'page-thumb loading';
          thumb.textContent = 'Rendering…';
          card.appendChild(thumb);

          const foot = document.createElement('div');
          foot.className = 'page-footer';
          foot.innerHTML =
            '<span class="pos">' + i + '</span>' +
            '<span class="orig">was p.' + i + '</span>';
          card.appendChild(foot);

          pagesStrip.appendChild(card);

          const page = await pdf.getPage(i);
          const scale = 0.35;
          const vp = page.getViewport({ scale: scale });
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          canvas.width = vp.width;
          canvas.height = vp.height;
          await page.render({ canvasContext: ctx, viewport: vp }).promise;
          thumb.classList.remove('loading');
          thumb.replaceChildren(canvas);
        }

        if (sortable) sortable.destroy();
        sortable = Sortable.create(pagesStrip, {
          animation: 200,
          easing: 'cubic-bezier(0.25, 1, 0.5, 1)',
          ghostClass: 'sortable-ghost',
          dragClass: 'sortable-drag',
          onEnd: function () {
            updatePositionLabels();
            schedulePreviewRefresh();
          }
        });

        btnDownload.disabled = false;
      }

      async function loadPdfFile(file) {
        if (!file || file.type !== 'application/pdf') {
          setStatus('Please choose a PDF file.', true);
          return;
        }
        setStatus('Loading…');
        btnDownload.disabled = true;
        editorPanel.classList.add('hidden');

        try {
          pdfBytes = new Uint8Array(await file.arrayBuffer());
          pdfLibDoc = await PDFLib.PDFDocument.load(pdfBytes.slice());
          await renderThumbnails(pdfBytes.slice());

          fileMeta.textContent = file.name + ' · ' + pageCount + ' page' + (pageCount === 1 ? '' : 's');
          editorPanel.classList.remove('hidden');
          setStatus('');
          if (togglePreview.checked) schedulePreviewRefresh(true);
        } catch (e) {
          console.error(e);
          setStatus('Could not read this PDF. It may be encrypted or damaged.', true);
          pdfBytes = null;
          pdfLibDoc = null;
        }
      }

      async function buildReorderedPdfBytes() {
        const order = getOrderFromDom();
        const out = await PDFLib.PDFDocument.create();
        for (let k = 0; k < order.length; k++) {
          const idx = order[k];
          const copied = await out.copyPages(pdfLibDoc, [idx]);
          out.addPage(copied[0]);
        }
        return out.save();
      }

      async function refreshLivePreview() {
        if (!pdfLibDoc || !togglePreview.checked) return;
        try {
          const bytes = await buildReorderedPdfBytes();
          const blob = new Blob([bytes], { type: 'application/pdf' });
          const prev = livePreview.src;
          if (prev) URL.revokeObjectURL(prev);
          livePreview.src = URL.createObjectURL(blob);
        } catch (e) {
          console.error(e);
        }
      }

      function schedulePreviewRefresh(immediate) {
        if (!togglePreview.checked) return;
        clearTimeout(previewDebounce);
        if (immediate) {
          refreshLivePreview();
          return;
        }
        previewDebounce = setTimeout(refreshLivePreview, 400);
      }

      dropzone.addEventListener('click', function () {
        fileInput.click();
      });

      ['dragenter', 'dragover'].forEach(function (ev) {
        dropzone.addEventListener(ev, function (e) {
          e.preventDefault();
          dropzone.classList.add('dragover');
        });
      });
      ['dragleave', 'drop'].forEach(function (ev) {
        dropzone.addEventListener(ev, function (e) {
          e.preventDefault();
          dropzone.classList.remove('dragover');
        });
      });
      dropzone.addEventListener('drop', function (e) {
        const f = e.dataTransfer.files[0];
        if (f) loadPdfFile(f);
      });

      fileInput.addEventListener('change', function () {
        const f = fileInput.files[0];
        if (f) loadPdfFile(f);
        fileInput.value = '';
      });

      btnReset.addEventListener('click', async function () {
        if (!pageCount) return;
        pagesStrip.innerHTML = '';
        await renderThumbnails(pdfBytes.slice());
        pdfLibDoc = await PDFLib.PDFDocument.load(pdfBytes.slice());
        updatePositionLabels();
        schedulePreviewRefresh(true);
      });

      btnDownload.addEventListener('click', async function () {
        if (!pdfLibDoc) return;
        btnDownload.disabled = true;
        setStatus('Building PDF…');
        try {
          const bytes = await buildReorderedPdfBytes();
          const blob = new Blob([bytes], { type: 'application/pdf' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = 'reordered.pdf';
          a.click();
          URL.revokeObjectURL(a.href);
          setStatus('');
        } catch (e) {
          console.error(e);
          setStatus('Export failed. Try another file or reload the page.', true);
        }
        btnDownload.disabled = false;
      });

      togglePreview.addEventListener('change', function () {
        livePreview.classList.toggle('hidden', !togglePreview.checked);
        if (togglePreview.checked) schedulePreviewRefresh(true);
        else {
          if (livePreview.src) URL.revokeObjectURL(livePreview.src);
          livePreview.removeAttribute('src');
        }
      });

      btnRefreshPreview.addEventListener('click', function () {
        schedulePreviewRefresh(true);
      });
    })();
  </script>
</body>
</html>
