# Netlify Configuration for scintilla.world
[build]
  publish = "."
  command = ""

# Old website/ folder redirects
[[redirects]]
  from = "/website/"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/website/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/website/privacypolicy/Safeguard.html"
  to = "/privacy/safeguard.html"
  status = 301

[[redirects]]
  from = "/website/privacypolicy/asin.html"
  to = "/privacy/asin.html"
  status = 301

# Old moringa-funnel redirect
[[redirects]]
  from = "/moringa-funnel.html"
  to = "/best-moringa-powder-australia.html"
  status = 301

# Privacy policy
[[redirects]]
  from = "/privacy-policy"
  to = "/extensions /SynapseSave/privacy-policy.html"
  status = 200

