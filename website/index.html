    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #ffffff;
            overflow-x: hidden;
        }
        .font-display {
            font-family: 'Space Grotesk', sans-serif;
        }
        .aurora-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
        }
        .blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 10s infinite ease-in-out;
        }
        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: #4f46e5; animation-delay: 0s; }
        .blob-2 { bottom: -10%; right: -10%; width: 40vw; height: 40vw; background: #db2777; animation-delay: -2s; }
        .blob-3 { top: 40%; left: 40%; width: 30vw; height: 30vw; background: #0ea5e9; animation-delay: -4s; }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .glass-panel:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        .neon-text {
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        .hamburger-line {
            transition: all 0.3s ease;
        }
        .menu-open .hamburger-line:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .menu-open .hamburger-line:nth-child(2) {
            opacity: 0;
        }
        .menu-open .hamburger-line:nth-child(3) {

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const PasswordGen = () => {
            const [pass, setPass] = useState('CLICK_GENERATE');
            const [copied, setCopied] = useState(false);
            const generate = () => {
                const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";
                let result = "";
                for (let i = 0; i < 12; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
                setPass(result);
                setCopied(false);
            };
            const copyToClipboard = () => {
                navigator.clipboard.writeText(pass).then(() => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                }).catch(() => {
                    const t = document.createElement('textarea');
                    t.value = pass;
                    document.body.appendChild(t);
                    t.select();
                    document.execCommand('copy');
                    document.body.removeChild(t);
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                });
            };
            return (
                <div className="p-4 h-full flex flex-col">
                    <div className="flex items-center gap-2 mb-4 text-emerald-400">
                        <i data-lucide="lock" className="w-5 h-5"></i>
                        <h3 className="font-bold uppercase tracking-wider text-sm">Secure Pass</h3>
                    </div>
                    <div className="flex-grow flex flex-col justify-center items-center gap-3">
                        <div onClick={copyToClipboard} className="cursor-pointer w-full bg-black/30 border border-emerald-500/30 p-3 rounded text-center font-mono text-emerald-200 hover:bg-emerald-900/20 transition-colors break-all">
                            {pass}
                            {copied && <div className="text-emerald-400 text-xs mt-1">Copied!</div>}
                        </div>
                        <button onClick={generate} className="w-full py-2 bg-emerald-600 hover:bg-emerald-500 rounded font-bold text-xs uppercase tracking-widest transition-all">Generate New</button>
                    </div>
                </div>
            );
        };

        const UnitConverter = () => {
            const [px, setPx] = useState(16);
            const remValue = px === '' || isNaN(Number(px)) ? '—' : (Number(px) / 16).toFixed(3);
            return (
                <div className="p-4 h-full flex flex-col">
                    <div className="flex items-center gap-2 mb-4 text-blue-400">
                        <i data-lucide="arrow-left-right" className="w-5 h-5"></i>
                        <h3 className="font-bold uppercase tracking-wider text-sm">PX ➜ REM</h3>
                    </div>
                    <div className="flex-grow flex items-center justify-between gap-4">
                        <div className="flex-1">
                            <input type="number" value={px} onChange={(e) => setPx(e.target.value)} className="w-full bg-transparent border-b border-blue-500/50 text-2xl font-mono text-center focus:outline-none" />
                            <div className="text-center text-xs text-gray-500 mt-1">Pixels</div>
                        </div>
                        <div className="text-blue-500 font-bold">=</div>
                        <div className="flex-1 text-center">
                            <div className="text-2xl font-mono text-white">{remValue}</div>
                            <div className="text-xs text-gray-500 mt-1">REM</div>
                        </div>
                    </div>
                </div>
            );
        };

        const ToolCard = ({ children, className = "", colSpan = "col-span-1", rowSpan = "row-span-1", onClick }) => (
            <div className={`glass-panel rounded-2xl overflow-hidden transition-all duration-300 ${colSpan} ${rowSpan} ${className} ${onClick ? 'cursor-pointer' : ''}`} onClick={onClick}>
                {children}
            </div>
        );

        const colorMap = {
            blue:    { bg: "bg-blue-500/20",    text: "text-blue-400",    hoverBg: "group-hover:bg-blue-500/30" },
            purple:  { bg: "bg-purple-500/20",  text: "text-purple-400",  hoverBg: "group-hover:bg-purple-500/30" },
            green:   { bg: "bg-green-500/20",   text: "text-green-400",   hoverBg: "group-hover:bg-green-500/30" },
            orange:  { bg: "bg-orange-500/20",  text: "text-orange-400",  hoverBg: "group-hover:bg-orange-500/30" },
            cyan:    { bg: "bg-cyan-500/20",    text: "text-cyan-400",    hoverBg: "group-hover:bg-cyan-500/30" },
            pink:    { bg: "bg-pink-500/20",    text: "text-pink-400",    hoverBg: "group-hover:bg-pink-500/30" },
            red:     { bg: "bg-red-500/20",     text: "text-red-400",     hoverBg: "group-hover:bg-red-500/30" },
            amber:   { bg: "bg-amber-500/20",   text: "text-amber-400",   hoverBg: "group-hover:bg-amber-500/30" },
            emerald: { bg: "bg-emerald-500/20", text: "text-emerald-400", hoverBg: "group-hover:bg-emerald-500/30" },
            violet:  { bg: "bg-violet-500/20",  text: "text-violet-400",  hoverBg: "group-hover:bg-violet-500/30" },
        };

        const StatCard = ({ icon, label, value, color }) => {
            const c = colorMap[color] || colorMap.blue;
            return (
                <div className="flex items-center gap-4 p-4 h-full">
                    <div className={`w-10 h-10 rounded-full ${c.bg} flex items-center justify-center ${c.text}`}>
                        <i data-lucide={icon} className="w-5 h-5"></i>
                    </div>
                    <div>
                        <div className="text-2xl font-display font-bold">{value}</div>
                        <div className="text-xs text-gray-400 uppercase tracking-wider">{label}</div>
                    </div>
                </div>
            );
        };

        const ToolLinkCard = ({ title, icon, description, color = "purple" }) => {
            const c = colorMap[color] || colorMap.purple;
            return (
                <div className="p-6 h-full flex flex-col justify-between group cursor-pointer">
                    <div className="flex justify-between items-start">
                        <div className={`p-2 ${c.bg} rounded-lg ${c.hoverBg} transition-colors ${c.text}`}>
                            <i data-lucide={icon} className="w-6 h-6"></i>
                        </div>
                    </div>
                    <div>
                        <h4 className="text-lg font-bold mb-1 group-hover:text-purple-400 transition-colors">{title}</h4>
                        <p className="text-xs text-gray-400 leading-relaxed">{description}</p>
                    </div>
                </div>
            );
        };

        const MobileMenu = ({ isOpen, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 md:hidden" onClick={onClose}>
                    <div className="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
                    <div className="absolute right-0 top-0 h-full w-64 bg-gray-950 border-l border-white/10 p-8 flex flex-col gap-6" onClick={(e) => e.stopPropagation()}>
                        <button onClick={onClose} className="self-end text-gray-400 hover:text-white">
                            <i data-lucide="x" className="w-6 h-6"></i>
                        </button>
                        <nav className="flex flex-col gap-6 text-lg font-medium text-gray-300">
                            <a href="#tools" onClick={onClose} className="hover:text-white transition-colors">Tools</a>
                            <a href="/blogs" className="hover:text-white transition-colors">Blogs</a>
                            <a href="#about" onClick={onClose} className="hover:text-white transition-colors">About</a>
                            <a href="/privacy-policy.html" onClick={onClose} className="hover:text-white transition-colors">Privacy</a>
                        </nav>
                        <div className="mt-auto border-t border-white/10 pt-6">
                            <p className="text-xs text-gray-500 mb-3">Proudly powered by</p>
                            <a href="https://nutrithrive.com.au" target="_blank" rel="noopener" className="flex items-center gap-2 text-emerald-400 hover:text-emerald-300 transition-colors">
                                <span className="font-bold text-sm">NutriThrive</span>
                                <i data-lucide="external-link" className="w-3 h-3"></i>
                            </a>
                        </div>
                    </div>
                </div>
            );
        };

        const NutriThriveBanner = () => (
            <div className="w-full max-w-7xl mb-8">
                <a href="https://nutrithrive.com.au" target="_blank" rel="noopener sponsored" className="block glass-panel rounded-2xl p-4 sm:p-6 hover:scale-[1.01] transition-all bg-gradient-to-r from-emerald-900/30 to-teal-900/30 border border-emerald-500/20">
                    <div className="flex flex-col sm:flex-row items-center justify-between gap-4">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 rounded-full bg-emerald-500/20 flex items-center justify-center text-emerald-400 shrink-0">
                                <i data-lucide="leaf" className="w-6 h-6"></i>
                            </div>
                            <div>
                                <p className="text-xs text-emerald-400 uppercase tracking-widest font-bold mb-1">Powered by NutriThrive</p>
                                <p className="text-sm text-gray-300">Australia's lab-tested moringa superfood — farm-fresh from Truganina, VIC</p>
                            </div>
                        </div>
                        <div className="bg-emerald-500 hover:bg-emerald-400 text-black px-5 py-2 rounded-lg text-sm font-bold shrink-0 transition-colors">
                            Shop Now →
                        </div>
                    </div>
                </a>
            </div>
        );

        const App = () => {
            const [menuOpen, setMenuOpen] = useState(false);

            useEffect(() => {
                const init = () => { if (typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons(); };
                init();
                setTimeout(init, 100);
                setTimeout(init, 500);
            }, [menuOpen]);

            return (
                <div className="relative min-h-screen w-full p-4 md:p-8 lg:p-12 flex flex-col items-center">
                    <div className="aurora-bg">
                        <div className="blob blob-1"></div>
                        <div className="blob blob-2"></div>
                        <div className="blob blob-3"></div>
                    </div>

                    <MobileMenu isOpen={menuOpen} onClose={() => setMenuOpen(false)} />

                    <header className="w-full max-w-7xl flex justify-between items-center mb-8">
                        <a href="/" className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-white text-black rounded-lg flex items-center justify-center font-bold text-xl font-display">S</div>
                            <span className="font-display text-2xl font-bold tracking-tight neon-text">SCINTILLA WORLD</span>
                        </a>
                        <nav className="hidden md:flex gap-8 text-sm font-medium text-gray-300">
                            <a href="#tools" className="hover:text-white transition-colors">Tools</a>
                            <a href="/blogs" className="hover:text-white transition-colors">Blogs</a>
                            <a href="#about" className="hover:text-white transition-colors">About</a>
                            <a href="/privacy-policy.html" className="hover:text-white transition-colors">Privacy</a>
                        </nav>
                        <button onClick={() => setMenuOpen(true)} className="md:hidden flex flex-col gap-1.5 p-2" aria-label="Open menu">
                            <span className="hamburger-line block w-6 h-0.5 bg-white rounded"></span>
                            <span className="hamburger-line block w-6 h-0.5 bg-white rounded"></span>
                            <span className="hamburger-line block w-6 h-0.5 bg-white rounded"></span>
                        </button>
                    </header>

                    <NutriThriveBanner />

                    <div className="w-full max-w-7xl mb-12 text-center md:text-left">
                        <h1 className="font-display text-4xl sm:text-5xl md:text-7xl lg:text-8xl font-bold leading-tight mb-6">
                            <span className="text-transparent bg-clip-text bg-gradient-to-r from-white via-gray-200 to-gray-500">Free Web Tools.</span><br />
                            <span className="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 via-pink-400 to-blue-400">No Sign-Up.</span>
                        </h1>
                        <p className="text-lg text-gray-400 max-w-2xl md:ml-2 mb-6">
                            17 browser-based utilities — PDF converter, sleep calculator, image enhancer & more.
                            <span className="text-white font-semibold"> No ads. No tracking. 100% private.</span>
                        </p>
                        <div className="flex flex-wrap gap-3 md:ml-2">
                            <a href="#tools" className="bg-white text-black px-6 py-3 rounded-lg font-bold text-sm hover:scale-105 transition-transform">Explore Tools ↓</a>
                            <a href="/blogs" className="border border-white/20 text-white px-6 py-3 rounded-lg font-bold text-sm hover:bg-white/5 transition-colors">Read Blog →</a>
                        </div>
                    </div>

                    <div id="tools" className="w-full max-w-7xl grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6 auto-rows-[200px]">
                        <ToolCard colSpan="md:col-span-2 lg:col-span-2" rowSpan="row-span-1 md:row-span-2" className="bg-gradient-to-br from-purple-900/50 to-blue-900/50 p-4 sm:p-6 md:p-8 flex flex-col justify-end relative group overflow-hidden">
                            <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10"></div>
                            <div className="absolute top-4 right-4 sm:top-6 sm:right-6 p-2 sm:p-3 bg-white/10 backdrop-blur rounded-full">
                                <i data-lucide="zap" className="w-5 h-5 sm:w-6 sm:h-6 text-yellow-300"></i>
                            </div>
                            <div className="relative z-10">
                                <h2 className="text-2xl sm:text-3xl lg:text-4xl font-display font-bold mb-2">Efficiency Redefined.</h2>
                                <p className="text-sm sm:text-base text-gray-300 mb-4 sm:mb-6">No ads. No lag. Just pure utility wrapped in a mind-blowing interface. Experience the future of web tools.</p>
                                <a href="#tools" className="flex items-center gap-2 text-xs sm:text-sm font-bold uppercase tracking-widest hover:gap-4 transition-all">Explore All <i data-lucide="arrow-right" className="w-4 h-4"></i></a>
                            </div>
                        </ToolCard>
                        <ToolCard colSpan="col-span-1" rowSpan="row-span-1" onClick={() => window.open('/tools/crazy-ideas/sleep-cycle-calculator/', '_blank')}>
                            <ToolLinkCard title="Sleep Calculator" icon="moon" description="Calculate optimal sleep times based on sleep cycles." color="purple" />
                        </ToolCard>
                        <ToolCard>
                            <StatCard icon="zap" label="Free Tools" value="17+" color="blue" />
                        </ToolCard>
                        <ToolCard colSpan="col-span-1" rowSpan="row-span-1">
                            <PasswordGen />
                        </ToolCard>
                        <ToolCard colSpan="col-span-1" rowSpan="row-span-1">
                            <UnitConverter />
                        </ToolCard>
                        <ToolCard colSpan="col-span-1" onClick={() => window.open('/tools/crazy-ideas/cost-per-serve/', '_blank')}>
                            <ToolLinkCard title="Cost Calculator" icon="calculator" description="Calculate cost per serving for products and ingredients." color="green" />
                        </ToolCard>
                        <ToolCard colSpan="col-span-1" onClick={() => window.open('/tools/crazy-ideas/quick-recipes/', '_blank')}>
                            <ToolLinkCard title="Recipe Generator" icon="chef-hat" description="Get recipe ideas based on your preferences." color="orange" />
                        </ToolCard>
                        <ToolCard colSpan="md:col-span-2" onClick={() => window.open('/tools/crazy-ideas/Image-Enhancer/', '_blank')} className="bg-gradient-to-r from-pink-900/40 to-purple-900/40 p-6 flex items-center justify-between">
                            <div>
                                <h3 className="text-xl font-bold mb-1">Image Enhancer</h3>
                                <p className="text-xs text-gray-300">Brighten, sharpen, and enhance photos instantly in your browser.</p>
                            </div>
                            <div className="bg-white text-black px-4 py-2 rounded text-sm font-bold hover:scale-105 transition-transform">Open →</div>
                        </ToolCard>
                        <ToolCard colSpan="col-span-1" onClick={() => window.open('/tools/crazy-ideas/hex-colour-finder/', '_blank')}>
                            <div className="h-full w-full bg-gradient-to-br from-orange-400 via-red-500 to-purple-600 flex items-center justify-center cursor-pointer group">
                                <div className="text-center">
                                    <i data-lucide="palette" className="w-8 h-8 mx-auto mb-2 text-white group-hover:scale-110 transition-transform"></i>
                                    <div className="font-bold text-sm">Color Finder</div>
                                </div>
                            </div>
                        </ToolCard>
                        <ToolCard colSpan="col-span-1" onClick={() => window.open('/tools/crazy-ideas/convoter/', '_blank')}>
                            <ToolLinkCard title="PDF Converter" icon="file-text" description="Convert PDFs to text or notes to PDFs instantly." color="blue" />
                        </ToolCard>
                        <ToolCard colSpan="col-span-1" onClick={() => window.open('/tools/crazy-ideas/pdf-editor/', '_blank')}>
                            <ToolLinkCard title="PDF Page Reorder" icon="layers" description="Drag and drop to rearrange pages, then download." color="cyan" />
                        </ToolCard>
                        <ToolCard colSpan="col-span-1" onClick={() => window.open('/tools/crazy-ideas/calendar-reminder/', '_blank')}>
                            <ToolLinkCard title="Calendar Reminder" icon="calendar" description="Generate calendar events from natural language." color="purple" />
                        </ToolCard>
                        <ToolCard colSpan="col-span-1" onClick={() => window.open('/tools/crazy-ideas/earning-finder/', '_blank')}>
                            <ToolLinkCard title="Meeting Tracker" icon="dollar-sign" description="Track meeting costs in real-time." color="emerald" />
                        </ToolCard>
                        <ToolCard colSpan="col-span-1" onClick={() => window.open('/tools/crazy-ideas/clothes-size-finder/', '_blank')}>
                            <ToolLinkCard title="Size Converter" icon="ruler" description="Convert sizes across brands and countries." color="pink" />
                        </ToolCard>
                        <ToolCard colSpan="col-span-1" onClick={() => window.open('/tools/crazy-ideas/place-near-me/', '_blank')}>
                            <ToolLinkCard title="Place Finder" icon="map-pin" description="Find restaurants and deals near you." color="red" />
                        </ToolCard>
                        <ToolCard colSpan="col-span-1" onClick={() => window.open('/tools/crazy-ideas/cards/', '_blank')}>
                            <ToolLinkCard title="PocketCard Studio" icon="credit-card" description="Design luxe trading cards and export PNG/GIF holo renders." color="amber" />
                        </ToolCard>
                        <ToolCard colSpan="col-span-1" onClick={() => window.open('/tools/crazy-ideas/sigil/', '_blank')}>
                            <ToolLinkCard title="SIGIL Generator" icon="sparkles" description="Generate sacred geometry sigils from intent." color="purple" />
                        </ToolCard>
                        <ToolCard colSpan="col-span-1" onClick={() => window.open('/tools/crazy-ideas/core/', '_blank')}>
                            <ToolLinkCard title="CORE Engine" icon="atom" description="3D holographic thought visualization." color="blue" />
                        </ToolCard>
                        <ToolCard colSpan="col-span-1" onClick={() => window.open('/tools/crazy-ideas/vision/', '_blank')}>
